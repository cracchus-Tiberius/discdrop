name: Daily Scrape & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 08:00 Norway time
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scrape:all
        run: pnpm scrape:all
        timeout-minutes: 90
        # scrape-all.js always exits 0 — individual failures are logged but don't block deploy
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fetch missing disc images
        run: pnpm fetch-images
        timeout-minutes: 10
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "DiscDrop Bot"
          git config user.email "bot@discdrop.net"
          # Whole data/ dir, not an explicit file list — a scraper writing a
          # new data file that this line doesn't know about was exactly how
          # unmatched-products.json ended up perpetually uncommitted, which
          # then made `git rebase` below fail with "unstaged changes".
          git add -A -- data/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          # Retry with rebase on a non-fast-forward push — a concurrent manual
          # push to main during a long scrape run would otherwise fail this
          # step outright and skip build+deploy entirely.
          for attempt in 1 2 3 4 5; do
            if git push; then
              break
            fi
            echo "Push rejected (attempt $attempt/5) — rebasing onto origin/main and retrying"
            git fetch origin main
            git rebase origin/main
            if [ "$attempt" -eq 5 ]; then
              echo "::error::git push failed after 5 attempts"
              exit 1
            fi
          done

      - name: Build
        run: pnpm build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=discdrop --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check price alerts
        run: pnpm check-alerts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
